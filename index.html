<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POD Dashboard Mock</title>

  <!-- Shepherd CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shepherd.js@10.0.1/dist/css/shepherd.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f6f3;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .layout {
      display: flex;
    }

    .sidebar {
      width: 220px;
      padding: 20px;
      background: #fafafa;
      border-right: 1px solid #ddd;
    }

    .nav-item {
      display: block;
      padding: 10px;
      margin-bottom: 10px;
      background: #eee;
      border-radius: 6px;
      text-decoration: none;
      color: black;
    }

    .main {
      padding: 30px;
      flex: 1;
    }

    .main-card {
      padding: 30px;
      background: white;
      border-radius: 12px;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div>POD Dashboard</div>
    <button onclick="startTour()">ガイド開始</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <a href="index.html" class="nav-item">ダッシュボード</a>
      <a href="data.html" class="nav-item">データ</a>
      <a href="storefront.html" class="nav-item">ストアフロント</a>
    </div>

    <div class="main">
      <div class="main-card">
        <h1>ダッシュボード</h1>
        <p>ここで全体の状況を確認できます。</p>
        <button class="btn-primary">データハブ</button>
        <button class="btn-secondary">ストアフロント</button>
      </div>
    </div>
  </div>

  <!-- Shepherd本体 -->
  <script src="https://cdn.jsdelivr.net/npm/shepherd.js@10.0.1/dist/js/shepherd.min.js"></script>

  <!-- ツアー設定 -->
  <script>
    const tour = new Shepherd.Tour({
      useModalOverlay: true,
      defaultStepOptions: {
        cancelIcon: { enabled: true },
        scrollTo: true
      }
    });

    tour.addStep({
      title: 'ダッシュボード',
      text: 'ここでは全体の状況を確認できます。',
      attachTo: {
        element: '.main-card',
        on: 'bottom'
      },
      buttons: [
        {
          text: '次へ',
          action: tour.next
        }
      ]
    });

    tour.addStep({
      title: 'データ',
      text: 'ここから印刷データを管理します。',
      attachTo: {
        element: 'a[href="data.html"]',
        on: 'right'
      },
      buttons: [
        { text: '戻る', action: tour.back },
        { text: '次へ', action: tour.next }
      ]
    });

    tour.addStep({
      title: 'ストアフロント',
      text: 'ここから注文につながります。',
      attachTo: {
        element: 'a[href="storefront.html"]',
        on: 'right'
      },
      buttons: [
        { text: '戻る', action: tour.back },
        { text: '完了', action: tour.complete }
      ]
    });

    function startTour() {
      tour.start();
    }
  </script>

</body>
</html>
